name: GagnezMobile CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ─── Vérification TypeScript ────────────────────────────────────────────────
  lint-and-typecheck:
    name: Vérification TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vérification TypeScript
        run: pnpm run typecheck

  # ─── Audit de sécurité ──────────────────────────────────────────────────────
  security-audit:
    name: Audit de sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit des dépendances
        run: pnpm audit --audit-level=high || true

  # ─── Build Web + Archive source ──────────────────────────────────────────────
  build:
    name: Build Expo (Web)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @workspace/moneyapp run build
        continue-on-error: true

      - name: Créer archive du code source
        run: |
          zip -r gagnez-mobile-source.zip \
            artifacts/moneyapp/app/ \
            artifacts/moneyapp/components/ \
            artifacts/moneyapp/context/ \
            artifacts/moneyapp/services/ \
            artifacts/moneyapp/data/ \
            artifacts/moneyapp/constants/ \
            artifacts/moneyapp/assets/ \
            artifacts/moneyapp/package.json \
            artifacts/moneyapp/app.json \
            artifacts/moneyapp/eas.json \
            README.md \
            PAIEMENT.md \
            POLITIQUE_CONFIDENTIALITE.md 2>/dev/null || true

      - name: Upload archive source
        uses: actions/upload-artifact@v4
        with:
          name: gagnez-mobile-source
          path: gagnez-mobile-source.zip
          retention-days: 30

      - name: Upload build dist
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build
          path: artifacts/moneyapp/dist/
          if-no-files-found: ignore
          retention-days: 30

  # ─── EAS Build — APK Preview ─────────────────────────────────────────────────
  eas-build-apk:
    name: EAS Build APK (Android)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.EAS_BUILD_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Installer EAS CLI
        run: npm install -g eas-cli

      - name: Build APK (preview)
        working-directory: artifacts/moneyapp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_FEDAPAY_PUBLIC_KEY: ${{ secrets.FEDAPAY_PUBLIC_KEY }}
        run: eas build --platform android --profile preview --non-interactive --no-wait

  # ─── EAS Build — AAB Production ──────────────────────────────────────────────
  eas-build-aab:
    name: EAS Build AAB Production (Play Store)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.EAS_BUILD_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Installer EAS CLI
        run: npm install -g eas-cli

      - name: Build AAB (production Play Store)
        working-directory: artifacts/moneyapp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_FEDAPAY_PUBLIC_KEY: ${{ secrets.FEDAPAY_PUBLIC_KEY }}
        run: eas build --platform android --profile production --non-interactive --no-wait

  # ─── Release GitHub ──────────────────────────────────────────────────────────
  release:
    name: Créer une release GitHub
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Générer le tag de release
        id: tag
        run: |
          VERSION=$(node -p "require('./artifacts/moneyapp/package.json').version")
          DATE=$(date +'%Y%m%d')
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${DATE}-${SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Télécharger l'archive source
        uses: actions/download-artifact@v4
        with:
          name: gagnez-mobile-source
          path: ./release-assets/

      - name: Créer la release avec GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DATE="${{ steps.tag.outputs.date }}"
          VERSION="${{ steps.tag.outputs.version }}"

          gh release create "$TAG" \
            --title "GagnezMobile v${VERSION} — ${DATE}" \
            --notes "## 🚀 GagnezMobile — Mise à jour du ${DATE}

          ### ✅ Fonctionnalités
          - 📺 Gains via publicités (300–1 000 GNF par pub)
          - 💳 Rechargement FedaPay (Orange Money, MTN, Wave, Carte)
          - 🏦 Retrait Mobile Money
          - 📊 Historique des transactions
          - 🏆 Système de niveaux (Débutant → Maître)
          - 🔧 Bug fix: rechargements séparés des gains publicitaires

          ### 📦 Build Android
          Pour activer les builds APK/AAB automatiques :
          1. Créez un compte sur https://expo.dev
          2. Ajoutez \`EXPO_TOKEN\` dans GitHub Secrets
          3. Activez \`EAS_BUILD_ENABLED = true\` dans GitHub Variables

          ### 📲 Installation via Expo Go
          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          pnpm install
          pnpm --filter @workspace/moneyapp run dev
          \`\`\`

          Voir [PAIEMENT.md](./PAIEMENT.md) et [store/guide_publication.md](./store/guide_publication.md)" \
            ./release-assets/gagnez-mobile-source.zip \
            --latest
