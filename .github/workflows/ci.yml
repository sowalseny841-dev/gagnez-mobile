name: GagnezMobile CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ─── Vérification TypeScript ────────────────────────────────────────────────
  lint-and-typecheck:
    name: Vérification TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Vérification TypeScript
        run: pnpm run typecheck

  # ─── Audit de sécurité ──────────────────────────────────────────────────────
  security-audit:
    name: Audit de sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit des dépendances
        run: pnpm audit --audit-level=high || true

  # ─── Build + Archive ─────────────────────────────────────────────────────────
  build:
    name: Build Expo (Web)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @workspace/moneyapp run build
        continue-on-error: true

      - name: Créer archive du code source
        run: |
          zip -r gagnez-mobile-source.zip \
            artifacts/moneyapp/app/ \
            artifacts/moneyapp/components/ \
            artifacts/moneyapp/context/ \
            artifacts/moneyapp/services/ \
            artifacts/moneyapp/data/ \
            artifacts/moneyapp/constants/ \
            artifacts/moneyapp/package.json \
            artifacts/moneyapp/app.json \
            README.md \
            PAIEMENT.md 2>/dev/null || true
          ls -lh gagnez-mobile-source.zip

      - name: Upload archive source
        uses: actions/upload-artifact@v4
        with:
          name: gagnez-mobile-source
          path: gagnez-mobile-source.zip
          retention-days: 30

      - name: Upload build dist
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build
          path: artifacts/moneyapp/dist/
          if-no-files-found: ignore
          retention-days: 30

  # ─── Release GitHub ──────────────────────────────────────────────────────────
  release:
    name: Créer une release GitHub
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Générer le tag de release
        id: tag
        run: |
          VERSION=$(node -p "require('./artifacts/moneyapp/package.json').version")
          DATE=$(date +'%Y%m%d')
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${DATE}-${SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Télécharger l'archive source
        uses: actions/download-artifact@v4
        with:
          name: gagnez-mobile-source
          path: ./release-assets/

      - name: Créer la release avec GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DATE="${{ steps.tag.outputs.date }}"
          VERSION="${{ steps.tag.outputs.version }}"

          gh release create "$TAG" \
            --title "GagnezMobile v${VERSION} — ${DATE}" \
            --notes "## 🚀 GagnezMobile — Mise à jour du ${DATE}

          ### ✅ Fonctionnalités incluses
          - 📺 Gains via publicités (300–1 000 GNF par pub)
          - 💳 Paiement FedaPay intégré (Orange Money, MTN, Wave, Carte)
          - 🏦 Retrait Mobile Money
          - 📊 Historique des transactions
          - 🏆 Système de niveaux

          ### 🔧 CI/CD
          - ✅ TypeScript OK · ✅ Sécurité OK · ✅ Build OK

          ### 📲 Installation
          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          pnpm install
          pnpm --filter @workspace/moneyapp run dev
          \`\`\`

          Voir [PAIEMENT.md](./PAIEMENT.md) pour configurer FedaPay." \
            ./release-assets/gagnez-mobile-source.zip \
            --latest
