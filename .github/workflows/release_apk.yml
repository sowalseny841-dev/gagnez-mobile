name: Release APK Android

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK et Release GitHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Installation de Java (requis pour Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Installation de EAS CLI
        run: npm install -g eas-cli

      - name: Build APK Android (local)
        working-directory: artifacts/moneyapp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_FEDAPAY_PUBLIC_KEY: ${{ secrets.FEDAPAY_PUBLIC_KEY }}
          EAS_NO_VCS: 1
        run: eas build --platform android --profile preview --local --non-interactive --output ../build.apk

      - name: Trouver le fichier APK généré
        id: find_apk
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find artifacts/moneyapp -name "*.apk" | head -1)
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK trouvé: $APK"
          ls -lh $APK

      - name: Créer la Release GitHub avec APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "GagnezMobile ${{ github.ref_name }}"
          body: |
            ## 📱 GagnezMobile ${{ github.ref_name }}

            ### Installation
            1. Téléchargez le fichier `gagnez-mobile-${{ github.ref_name }}.apk`
            2. Sur votre téléphone Android : **Paramètres → Sécurité → Sources inconnues** (activer)
            3. Ouvrez le fichier APK et installez

            ### Fonctionnalités
            - 📺 Gains via publicités (300–1 000 GNF)
            - 💳 Rechargement FedaPay (Orange Money, MTN, Wave)
            - 🏦 Retrait Mobile Money
            - 📊 Historique des transactions
            - 🏆 Système de niveaux
          files: ${{ steps.find_apk.outputs.apk_path }}
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
