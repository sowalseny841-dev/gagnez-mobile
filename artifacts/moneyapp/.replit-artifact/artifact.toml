kind = "mobile"
previewPath = "/"
title = "GagnezMobile - Gagnez avec les pubs"
version = "1.0.0"
id = "artifacts/moneyapp"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25579

[services.development]
run = "pnpm --filter @workspace/moneyapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moneyapp", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/moneyapp", "run", "serve" ]

[services.env]
PORT = "25579"
BASE_PATH = "/"
